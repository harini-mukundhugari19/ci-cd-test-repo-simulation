name: Silent Failure Simulation

on:
  push:
    branches:
      - test-ambiguous-errors
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Run Silent Failure Script
        run: python silent_failure.py
